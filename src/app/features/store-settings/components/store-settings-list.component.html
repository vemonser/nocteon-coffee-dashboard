<div class="flex flex-col gap-6 p-6">
  <!-- Header -->
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold tracking-tight">{{ 'StoreSettingPage.title' | transloco }}</h1>
    </div>
  </div>

  <!-- Loading State -->
  @if (loading()) {
    <div class="rounded-md border">
      <div
        class="h-12 border-b bg-muted/50 animate-pulse"
        *ngFor="let _ of [1]"
      ></div>
    </div>
  }

  <!-- Single Row -->
  @if (!loading()) {
    <div class="rounded-md border bg-card">
      <app-data-table
        [data]="items()"
        [columns]="columns"
        [loading]="loading()"
        [initialSort]="{ column: currentSort, direction: currentDirection }"
        [editPermission]="'settings:update'"
        [showView]="false"
        [showDelete]="false"
        (hasView)="false"
        (edit)="openEditDialog($event)"
        (sortChange)="onSortChange($event)"
      />
    </div>
  }
</div>

<!-- ══════════════════════════════════════════════════════════
     Edit Dialog
══════════════════════════════════════════════════════════ -->
@if (showDialog()) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4 backdrop-blur-sm">
    <div class="w-full max-w-lg max-h-[90vh] overflow-y-auto rounded-2xl bg-card shadow-2xl border">
      <!-- Dialog Header -->
      <div class="flex items-center justify-between p-6 border-b sticky top-0 bg-card">
        <h2 class="text-lg font-bold">Edit Store Setting</h2>
        <button hlmBtn variant="ghost" size="icon" class="size-8" (click)="closeDialog()">
          <ng-icon name="lucideX" class="size-4" />
        </button>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-6 space-y-5">
        <div class="space-y-1.5">
          <label hlmLabel>Free Shipping Threshold *</label>
          <input
            hlmInput
            formControlName="freeShippingThreshold"
            type="number"
            min="0"
            placeholder="500"
            class="w-full"
          />
          @if (form.get('freeShippingThreshold')?.invalid && form.get('freeShippingThreshold')?.touched) {
            <p class="text-xs text-destructive">Free Shipping Threshold is required</p>
          }
        </div>

        <!-- Buttons -->
        <div class="flex gap-3 pt-2">
          <button type="button" hlmBtn variant="outline" class="flex-1" (click)="closeDialog()">
            Cancel
          </button>
          <button type="submit" hlmBtn class="flex-1" [disabled]="form.invalid || submitting()">
            @if (submitting()) {
              <span class="animate-spin mr-2">⟳</span>
            }
            {{ submitting() ? 'Saving...' : 'Save' }}
          </button>
        </div>
      </form>
    </div>
  </div>
}
