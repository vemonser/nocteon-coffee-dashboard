<!-- tasting-notes-step.component.html -->
<div class="space-y-4">
  <h2 class="text-lg font-bold mb-2">Tasting Notes</h2>
  <p class="text-sm text-gray-500 mb-4">Select all flavor notes that apply to this coffee.</p>

  @if (allNotes().length === 0) {
    <div class="text-center py-12 text-gray-400 border-2 border-dashed rounded-md">
      No tasting notes available yet. Add some in the Tasting Notes management page first.
    </div>
  } @else {
    <div class="flex flex-wrap gap-2">
      @for (note of allNotes(); track note.slug) {
        <button type="button" (click)="toggle(note.slug)"
          class="px-3 py-1.5 rounded-full text-sm border transition-colors"
          [class]="isSelected(note.slug)
            ? 'bg-amber-600 text-white border-amber-600'
            : 'bg-white text-gray-700 border-gray-300 hover:border-amber-400'">
          {{ getNoteName(note) }}
        </button>
      }
    </div>
  }
</div>
