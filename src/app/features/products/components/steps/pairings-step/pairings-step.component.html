<!-- pairings-step.component.html -->
<div class="space-y-4">
  <h2 class="text-lg font-bold mb-2">Pairings</h2>
  <p class="text-sm text-gray-500 mb-4">Suggest foods or treats that pair well with this coffee.</p>

  @if (allPairings().length === 0) {
    <div class="text-center py-12 text-gray-400 border-2 border-dashed rounded-md">
      No pairings available yet. Add some in the Pairings management page first.
    </div>
  } @else {
    <div class="flex flex-wrap gap-2">
      @for (pairing of allPairings(); track pairing.slug) {
        <button type="button" (click)="toggle(pairing.slug)"
          class="px-3 py-1.5 rounded-full text-sm border transition-colors"
          [class]="isSelected(pairing.slug)
            ? 'bg-amber-600 text-white border-amber-600'
            : 'bg-white text-gray-700 border-gray-300 hover:border-amber-400'">
          {{ getPairingName(pairing) }}
        </button>
      }
    </div>
  }
</div>
