<div class="flex items-center gap-3">
  <!-- Color Preview -->
  <div
    class="w-6 h-6 rounded-full border border-gray-300 shadow-sm shrink-0"
    [style.background-color]="color()"
    [title]="color()"
  ></div>

  <!-- Hex Value -->
  <span class="font-mono text-sm text-gray-700 dark:text-gray-300 uppercase">
    {{ color() }}
  </span>
</div>
