<div class="flex items-center gap-3">
  @for (color of colors; track color.name) {

    <button
      type="button"
      (click)="onColorClick($event, color.name)"
      class="size-8 rounded-full border-2 transition-all duration-300 hover:scale-110"
      [style.background]="color.hex"
      [class.border-foreground]="themeService.color() === color.name"
      [class.border-transparent]="themeService.color() !== color.name"
    ></button>

  }
</div>
