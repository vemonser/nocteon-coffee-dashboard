<div
  class="rounded-3xl h-full flex flex-col justify-between border border-border/50 bg-card p-5 shadow-sm transition-all duration-300 hover:shadow-lg dark:bg-slate-950/70 dark:backdrop-blur-xl"
>
  <div class="flex justify-between items-start">
    <div>
      <p class="text-xs uppercase text-muted-foreground">
        {{ title() }}
      </p>

      <h3 class="mt-3 text-3xl font-semibold">
        {{ value() }}
      </h3>

      <p class="mt-2 text-sm text-emerald-500">↑ {{ growth() }} vs last week</p>
    </div>

    <div
      class="flex h-10 w-10 items-center justify-center rounded-2xl bg-primary/10 text-primary ring-1 ring-primary/20"
    >
      <ng-icon [name]="icon()" size="22" class="text-primary" />
    </div>
  </div>

  <div class="mt-4  ">
    <ng-content />
  </div>
</div>
