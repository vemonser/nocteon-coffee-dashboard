<!doctype html>
<html lang="en">
  <head>
    <script>
      (() => {
        const saved = localStorage.getItem('theme');

        const dark = saved
          ? saved === 'dark'
          : window.matchMedia('(prefers-color-scheme: dark)').matches;

        document.documentElement.classList.toggle('dark', dark);
      })();
    </script>

    <meta charset="utf-8" />
    <title>NocteonDash</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@100..900&family=Almarai:wght@300;400;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
